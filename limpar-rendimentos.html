<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Limpeza de Rendimentos · Controlo Financeiro</title>
<style>
  body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 2rem; }
  h1 { color: #7c3aed; }
  .block { background: #1e293b; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
  table { border-collapse: collapse; width: 100%; }
  td, th { border: 1px solid #334155; padding: 8px 12px; }
  th { background: #0f172a; color: #94a3b8; font-size: .75rem; text-transform: uppercase; }
  .btn-del { background: #dc2626; color: white; border: none; border-radius: 5px; padding: 6px 14px; cursor: pointer; font-size: 13px; }
  .btn-del:hover { background: #b91c1c; }
  .btn-save { background: #10b981; color: white; border: none; border-radius: 6px; margin-top: 1rem; padding: 12px 24px; font-size: 16px; cursor: pointer; }
  .deleted { text-decoration: line-through; opacity: 0.4; }
  #status { margin-top: 1rem; padding: 1rem; border-radius: 8px; background: #14532d; display: none; }
  #error  { margin-top: 1rem; padding: 1rem; border-radius: 8px; background: #7f1d1d; display: none; }
</style>
</head>
<body>
<h1>🧹 Limpeza de Rendimentos</h1>

<div class="block">
  <div id="tbody-wrap">A carregar...</div>
  <br>
  <button class="btn-save" id="btnSave" style="display:none">💾 Guardar e ir para o Dashboard</button>
</div>

<div id="status">✅ Guardado com sucesso! A redirecionar...</div>
<div id="error"></div>

<script>
(function() {
  var raw = localStorage.getItem('finance-control-app');
  if (!raw) {
    document.getElementById('tbody-wrap').innerHTML = '<p style="color:red">❌ Sem dados em localStorage. Abre a app principal primeiro.</p>';
    return;
  }

  var state = JSON.parse(raw);
  var incomes = state.incomes || [];
  var toDelete = {}; // índices marcados para apagar

  function render() {
    if (incomes.length === 0) {
      document.getElementById('tbody-wrap').innerHTML = '<p style="color:#94a3b8">Sem rendimentos registados.</p>';
      return;
    }

    var html = '<table><thead><tr><th>#</th><th>Nome</th><th>Valor</th><th>Mês</th><th>Dia</th><th>Ação</th></tr></thead><tbody>';
    for (var i = 0; i < incomes.length; i++) {
      var inc = incomes[i];
      var del = toDelete[i];
      html += '<tr class="' + (del ? 'deleted' : '') + '">'
        + '<td>' + (i+1) + '</td>'
        + '<td><strong>' + (inc.name || '?') + '</strong></td>'
        + '<td style="color:#fbbf24">' + Number(inc.amount || 0).toFixed(2) + ' €</td>'
        + '<td>' + (inc.monthKey || '<em style="color:#ef4444">sem mês</em>') + '</td>'
        + '<td>' + (inc.day || '?') + '</td>'
        + '<td>' + (del
            ? '<span style="color:#94a3b8">Marcado p/ apagar</span> <button class="btn-del" style="background:#555" data-undo="' + i + '">↩ Desfazer</button>'
            : '<button class="btn-del" data-idx="' + i + '">🗑️ Apagar</button>')
        + '</td></tr>';
    }
    html += '</tbody></table>';
    document.getElementById('tbody-wrap').innerHTML = html;

    // Event listeners nos botões de apagar
    var delBtns = document.querySelectorAll('[data-idx]');
    for (var j = 0; j < delBtns.length; j++) {
      delBtns[j].addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-idx'));
        toDelete[idx] = true;
        document.getElementById('btnSave').style.display = 'inline-block';
        render();
      });
    }

    // Event listeners nos botões de desfazer
    var undoBtns = document.querySelectorAll('[data-undo]');
    for (var k = 0; k < undoBtns.length; k++) {
      undoBtns[k].addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-undo'));
        delete toDelete[idx];
        if (Object.keys(toDelete).length === 0) {
          document.getElementById('btnSave').style.display = 'none';
        }
        render();
      });
    }
  }

  render();

  document.getElementById('btnSave').addEventListener('click', function() {
    // Remover os marcados (em ordem decrescente para não baralhar índices)
    var indices = Object.keys(toDelete).map(Number).sort(function(a,b){ return b-a; });
    for (var i = 0; i < indices.length; i++) {
      state.incomes.splice(indices[i], 1);
    }

    // Guardar estado limpo
    localStorage.setItem('finance-control-app', JSON.stringify(state));
    // Proteger contra sobrescrita pela Firebase: marcar como "estado local é o mais recente"
    // A Firebase só pode sobrescrever se cloudData.updatedAt > last_firebase_sync.
    // Ao marcarmos agora, garantimos que quando a app carregar e sincronizar,
    // o estado limpo será ENVIADO para a Firebase e não o contrário.
    localStorage.setItem('last_firebase_sync', Date.now());

    document.getElementById('status').style.display = 'block';
    this.style.display = 'none';

    setTimeout(function() {
      window.location.href = 'dashboard.html';
    }, 2000);
  });

})();
</script>
</body>
</html>
